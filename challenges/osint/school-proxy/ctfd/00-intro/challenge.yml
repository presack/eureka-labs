name: "School Proxy: Background"
author: presack
category: "OSINT - School Proxy"
description: |
  ## Scenario

  Teachers at your child's school have noticed students accessing content that bypasses the web filter in order to play games. One teacher noticed a website used for this purpose: **mathteachersforhire.shop**. The domain name sounds innocuous - but something doesn't add up.

  The IT admin is new and is at a loss for what to do to research this domain and possibly find others that should be blocked. However, he heard that you recently had some FBI cyber training and has asked for your help. Your job is to investigate this domain, characterize what it's actually doing, and map as much of the related infrastructure as you can find.

  A full investigation for this challenge will take you through several pivots on this infrastructure, MANY domains and IP addresses. Ultimately, if you are successful in your mission, you will even find a GitHub username - all using passive, tool-assisted reconnaissance only.

  ## Starting Point

  ```
  mathteachersforhire.shop
  ```

  ## Tools

  The following sites are your primary research tools. You can use them directly in your browser, or use **[StealthOps](https://bw.stealthops.dev)** — a web-based OSINT platform that queries many of these sources from a single interface.

  | Tool | URL | What it's good for |
  |---|---|---|
  | ViewDNS | viewdns.info | Subdomains, reverse IP, IP history |
  | DNSDumpster | dnsdumpster.com | DNS map and relationships |
  | URLScan | urlscan.io | Historical scans, linked resources |
  | VirusTotal | virustotal.com | Reputation and detection |
  | AbuseIPDB | abuseipdb.com | IP abuse history |
  | Censys | censys.io | Port/banner/tech stack (IP searches) |

  ## Exercise Structure

  Six levels, each building on the previous. Work them in order.

  | Level | Focus |
  |---|---|
  | 1 | Basic recon |
  | 2 | Pattern recognition |
  | 3 | First pivot |
  | 4 | Infrastructure mapping |
  | 5 | Deep analysis |
  | 6 | Attribution |

  Read this, then proceed to the first challenge.
