# Forensics - Kabo Seretse
# Challenge set: Kabelo Motsumi — Procurement Fraud
# Author: presack

# ============================================================
# INTRO (0 pts)
# ============================================================

- name: "Kabo Seretse: Background"
  author: presack
  category: "Kickback"
  description: |
    ## Scenario

    You are a digital forensic analyst at the Directorate on Corruption and Economic Crime (DCEC) in Gaborone, Botswana.

    A tip has been received from Molapo Building Supplies, a construction materials competitor of Kagiso Supplies. The tipster alleges that Kagiso Supplies has been winning procurement contracts they should not be winning, and that there are rumors of corrupt dealings in the award process. Your supervisor has tasked you to investigate.

    As a first step, you decide to examine discarded materials from Kagiso Supplies to look for leads.

    ## Starting Point

    Physical examination of discarded materials (trash cover) at Kagiso Supplies premises, Gaborone. Your instructor will direct you to this garbage. (Don't worry, it's not smelly or dirty like normal garbage!)

    ## Evidence Files

    As your investigation progresses, you will uncover information that will lead to you requesting legal process.

    
    ## Exercise Structure

    This exercise will be multiple phases, guided by your instructors. You will use skills learned in this course such as blockchain analysis, IP/Web infrastructure analysis, Egmont requests, and serving/analyzing legal process.

    Type "flag" to begin your investigation!

  value: 10
  type: standard
  state: visible
  flags:
    - type: static
      content: "flag"
      data: case_insensitive
  hints: []

# ============================================================
# PHASE 1 — DUMPSTER DIVE AND BLOCKCHAIN TRACE (100 pts each)
# ============================================================

- name: "One man's trash..."
  author: presack
  category: "Kickback"
  description: |
    Your investigation begins with a physical search of discarded materials at Kagiso Supplies in Gaborone.

    You search the trash from Kagiso Supplies. Among the debris you find an important string of characters you immediately identify as important. Typing it may not be fun, but type it exactly for the correct answer!
    (Hint: Maybe type it in notepad or at least copy it to the clipboard or something so you have it handy. Just in case a typo happens!)

  value: 100
  type: standard
  state: visible
  flags:
    - type: static
      content: "3C9akyM5Fb8Av3V2ouVRzcS3ZBJ6tfGoLx"
      data: case_insensitive
  hints:
    - content: "Check the crumpled note in the trash bin. Copy the address exactly — it begins with 3C9a."
      cost: 10

- name: "Primary Exchange"
  author: presack
  category: "Kickback"
  description: |
    You have a Bitcoin address. Now trace it.

    Open a public blockchain explorer (blockstream.info or blockchain.com) and search for the address. Examine the transaction history: funds arrive at this address and are later swept onward. Follow the sweep pattern to identify which cryptocurrency exchange holds the destination wallet.

    What exchange is the destination for the funds leaving this address?
  value: 100
  type: standard
  state: visible
  requirements:
    prerequisites:
      - "One man's trash..."
  flags:
    - type: static
      content: "Luno"
      data: case_insensitive
  hints:
    - content: "Look at where the BTC goes after it arrives at the deposit address. Large custodial wallets with regular sweep patterns indicate an exchange. Consider which exchanges operate in southern Africa."
      cost: 15

- name: "Second Exchange"
  author: presack
  category: "Kickback"
  description: |
    The blockchain trail shows a second outbound address that traces to a different exchange in a different legal jurisdiction.

    What is that second exchange?

    Note: this exchange is U.S.-regulated. Obtaining records requires routing a request through Egmont — FIA Botswana submits to FinCEN, which compels the exchange under the Bank Secrecy Act. Submit that request to your instructor now alongside your Luno request. The return will arrive later in the investigation.
  value: 100
  type: standard
  state: visible
  requirements:
    prerequisites:
      - "Primary Exchange"
  flags:
    - type: static
      content: "Coinbase"
      data: case_insensitive
  hints:
    - content: "Follow the outgoing sweep to its second-hop destination address. The address begins bc1q — a native SegWit format used by several major exchanges. Which U.S.-based exchange is most widely used in this region?"
      cost: 15

