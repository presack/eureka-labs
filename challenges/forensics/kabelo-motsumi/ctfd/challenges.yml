- name: "Case Summary"
  author: presack
  category: "Kickback"
  description: |
    **Bonus — open analyst question. Submit your written response to your instructor for scoring.**

    Write a full investigative case summary connecting every forensic link from the physical lead at Kagiso Supplies to the Gmail evidence.

    Your summary should address:

    - What the scheme was and who was involved
    - How payments moved (channels, amounts, destination accounts)
    - How the subject attempted to conceal his activity
    - Where his operational security failed and why
    - What evidence you would prioritise in a criminal referral to the DCEC, and why

    Points are awarded for analytical depth, correct identification of the complete forensic chain, and quality of the criminal referral argument.
  value: 400
  type: manual
  state: visible
  requirements:
    prerequisites:
      - "Consciousness of Guilt"
  hints:
    - content: "Walk the chain from first to last: trash note → blockchain → Luno → burner account → ISP return → cookie correlation → Coinbase Egmont → personal account → Gmail → Drive → behavioral trail. Every link reinforces the others. The most powerful evidence is self-authored."
      cost: 0
